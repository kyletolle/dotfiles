
# Use Ctrl-a as prefix (more ergonomic than Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Use vi keybinds
set -g mode-keys vi

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support (useful via Termius)
set -g mouse on
# Unbind right-click from tmux so Termius can handle it as system clipboard paste
# (paste-buffer only pulls from tmux's internal buffer, not system clipboard)
unbind-key -T root MouseDown3Pane
bind-key -T root MouseDown2Pane display-menu -T "tmux" \
  "Split Horizontal" h "split-window -h" \
  "Split Vertical"   v "split-window -v" \
  "New Window"       n "new-window"

# Longer scrollback buffer
set -g history-limit 200000

# Better colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Status bar
set -g status-style 'bg=#1a1b26 fg=#a9b1d6'
set -g status-left '#[fg=#7aa2f7,bold] #S '
set -g status-right '#[fg=#565f89] %H:%M '
set -g status-left-length 30

# Active pane border stands out (Tokyo Night blue)
set -g pane-active-border-style 'fg=#7aa2f7'
set -g pane-border-style 'fg=#3b4261'

# Set terminal window title from tmux window name
set -g set-titles on
set -g set-titles-string "#I: #W"

# Don't rename windows automatically
set -g allow-rename off

# Auto-renumber windows when one is closed (no gaps)
set -g renumber-windows on

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Quick window switching (Alt-N, no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Join an existing window into current window as a pane
bind j command-prompt -p "join window:" "join-pane -h -s :%%"
bind J command-prompt -p "join window (stacked):" "join-pane -s :%%"

# Break pane back out to its own window (inverse of join)
bind b break-pane

# Even out pane sizes
bind E select-layout tiled

# Increase escape time for better Termius compatibility
set -sg escape-time 50
setw -g aggressive-resize on

# Allow T-MUX to send focus events to the applications we are using.
set -g focus-events on

# Moshi: propagate MOSHI_CLIENT into tmux sessions
set-option -ga update-environment " MOSHI_CLIENT"

# Clear status regions for Moshi clients so swipe detection stays clean
if-shell '[ -n "$MOSHI_CLIENT" ]' {
  set -g status-left ''
  set -g status-right ''
}
